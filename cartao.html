<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<style>

    .cartao{

        width: 400px;
        padding: 20px;
        border-radius: 20px;
        background-color: grey;
        font-family: sans-serif;

        position: relative;

    }

    .p {

        margin: 0 0 5px;
    }

    .master{

        border: solid 0px;
        width: 140px;
        position: absolute;
        right: 20px;
        bottom: 20px;

    }

    .luz {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #444; 
    }

    .amarelo{

        position: absolute;
        right: 0;
        bottom: 0;
        z-index: 1;

    }

    .vermelho{

        position: absolute;
        right: 45px;
        bottom: 0;

    }

    .vermelho { background: red; }
    .amarelo { background: rgb(255, 166, 0); }




</style>






<body>
    
    <div class="cartao">
        
        <h1>business</h1>
         <p>234 345 2345645 34567</p>
          <p>12/23</p> <p>Le. M</p>
           <div class="master">
              <div class="luz vermelho"></div>
                    <div class="luz amarelo"></div>
              </div> </div>


</body>
</html>
